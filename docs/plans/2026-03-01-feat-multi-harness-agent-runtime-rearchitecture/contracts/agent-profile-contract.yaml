version: 1
name: agent-profile-contract
summary: Canonical `@` agent spec schema, policy translation boundaries, and resolver invariants.

schema:
  AgentSpec:
    required:
      - id
      - role
      - runtimeRoute
      - toolPolicy
      - acceptanceChecks
    fields:
      id:
        type: string
        pattern: "^[a-z0-9][a-z0-9_:-]*$"
      role:
        type: string
        minLength: 1
      runtimeRoute:
        type: string
        minLength: 1
      toolPolicy:
        type: object
        explicitDefault: required
      modelPolicyHint:
        type: string
        required: false
      acceptanceChecks:
        type: array
        minItems: 1
        itemType: string

interfaces:
  resolveAgentTarget:
    input:
      target: string
      profiles:
        - AgentSpec
      context:
        harness: string
    output:
      agentId: string
      route: string
      policy: object
      fallback:
        used: boolean
        reason: string

  generateAgentCatalog:
    input:
      profiles:
        - AgentSpec
    output:
      profiles:
        - AgentSpec
      digest: string

invariants:
  - Agent IDs are globally unique.
  - Tool policy translation is deterministic for identical inputs.
  - Unsupported host capabilities must emit explicit fallback metadata.
  - Generated agent catalogs are immutable at runtime.

nonGoals:
  - Embedding host-specific UX instructions in canonical specs.
  - Implicit fallback behavior without diagnostics.
