version: 1
name: adapter-conformance-contract
summary: Cross-harness conformance contract for semantic parity of `/` command and `@` agent behavior.

targetAdapters:
  - claude
  - codex
  - copilot

inputs:
  commandFixtures:
    - id: string
      command: string
      args: object
      expectedLifecycle: string
  agentFixtures:
    - id: string
      target: string
      expectedRoute: string
      expectedPolicyDigest: string

normalization:
  outputModel:
    commandTrace:
      fields:
        - adapter
        - commandId
        - lifecyclePhases
        - errorClass
        - policyDigest
    agentTrace:
      fields:
        - adapter
        - target
        - resolvedProfileId
        - resolvedRoute
        - policyDigest
        - fallbackUsed

thresholds:
  commandParityP1:
    minimumPassRate: 0.95
  agentRoutingParity:
    minimumPassRate: 1.0
  schemaValidation:
    minimumPassRate: 1.0

interfaces:
  runConformanceSuite:
    input:
      adapters:
        - string
      fixtures:
        command:
          - object
        agent:
          - object
    output:
      summary:
        adapterResults:
          - adapter: string
            commandPassRate: number
            agentPassRate: number
            failures:
              - fixtureId: string
                class: string
                details: string
      releaseGate:
        passed: boolean
        reasons:
          - string

invariants:
  - Conformance output must be deterministic for identical fixtures and source catalogs.
  - Release gate fails if any adapter violates threshold minimums.
  - Failures include adapter name and discrepancy class.
  - Conformance compares normalized semantics, not host transport syntax.

nonGoals:
  - Pixel-level host UI behavior verification.
  - Support guarantees for harnesses outside claude/codex/copilot.
