[tasks.jinn-init]
description = "Initialize jinn in test project"
run = "bun run src/cli/jinn/index.ts init --tools opencode --yes"

[tasks.jinn-update]
description = "Update jinn files"
run = "bun run src/cli/jinn/index.ts update"

[tasks.jinn-detect]
description = "Detect available AI tools"
run = "bun run src/cli/jinn/index.ts detect"

[tasks.jinn-config-show]
description = "Show jinn configuration"
run = "bun run src/cli/jinn/index.ts config show"

[tasks.jinn-config-add-tool]
description = "Add a tool to config"
run = "bun run src/cli/jinn/index.ts config add-tool cursor"

[tasks.jinn-all]
description = "Run all jinn CLI commands"
run = [
  "bun run src/cli/jinn/index.ts detect",
  "bun run src/cli/jinn/index.ts init --tools opencode --yes",
  "bun run src/cli/jinn/index.ts config show",
  "bun run src/cli/jinn/index.ts update"
]

[tasks.test]
description = "Run all tests"
run = "bun test"

[tasks.test-adapters]
description = "Run adapter tests"
run = "bun test src/core/adapters"

[tasks.test-integration]
description = "Run integration tests"
run = "bun test test/integration"

[tasks.typecheck]
description = "Run TypeScript type checking"
run = "bun run typecheck"

[tasks.lint]
description = "Run linting"
run = "bun run lint"

[tasks.link]
description = "Link jinn CLI globally with bun link"
run = "bun link"

[tasks.unlink]
description = "Remove global jinn CLI link"
run = "bun unlink"

[tasks.build-dev]
description = "Build development version of CLI"
run = "bun build ./src/cli/main.ts --compile --outfile ./dist/jinn-dev"

[tasks.link-dev]
description = "Link development build globally (symlink to /usr/local/bin)"
run = "ln -sf $PWD/dist/jinn-dev /usr/local/bin/jinn-dev"