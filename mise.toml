[tasks.kernel-init]
description = "Initialize kernel in test project"
run = "bun run src/cli/index.ts init --tools opencode --yes"

[tasks.kernel-update]
description = "Update kernel files"
run = "bun run src/cli/index.ts update"

[tasks.kernel-detect]
description = "Detect available AI tools"
run = "bun run src/cli/index.ts detect"

[tasks.kernel-config-show]
description = "Show kernel configuration"
run = "bun run src/cli/index.ts config show"

[tasks.kernel-config-add-tool]
description = "Add a tool to config"
run = "bun run src/cli/index.ts config add-tool cursor"

[tasks.kernel-all]
description = "Run all kernel CLI commands"
run = [
  "bun run src/cli/index.ts detect",
  "bun run src/cli/index.ts init --tools opencode --yes",
  "bun run src/cli/index.ts config show",
  "bun run src/cli/index.ts update",
]

[tasks.test]
description = "Run all tests"
run = "bun test"

[tasks.test-adapters]
description = "Run adapter tests"
run = "bun test src/core/adapters"

[tasks.test-integration]
description = "Run integration tests"
run = "bun test test/integration"

[tasks.typecheck]
description = "Run TypeScript type checking"
run = "bun run typecheck"

[tasks.lint]
description = "Run linting"
run = "bun run lint"

[tasks.link]
description = "Link kernel CLI globally with bun link"
run = "bun link"

[tasks.unlink]
description = "Remove global kernel CLI link"
run = "bun unlink"

[tasks.build-dev]
description = "Build development version of CLI"
run = "bun build ./src/cli/main.ts --compile --outfile ./dist/kernel-dev"

[tasks.link-dev]
description = "Link development build globally (symlink to /usr/local/bin)"
run = "ln -sf $PWD/dist/kernel-dev /usr/local/bin/kernel-dev"
